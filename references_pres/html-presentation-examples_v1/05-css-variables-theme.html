<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Variables Theme Presentation</title>
  <style>
    :root {
      --bg:#f6f6f3; --surface:#ffffff; --surface-2:#f1efe9; --text:#1e1c19; --muted:#6e675f; --accent:#01696f;
    }
    [data-theme="dark"] {
      --bg:#161514; --surface:#1f1d1a; --surface-2:#292622; --text:#f3f1ec; --muted:#b0aaa3; --accent:#6ec3c8;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:Inter,Arial,sans-serif; transition:background .2s,color .2s; }
    .deck { display:grid; gap:24px; padding:24px; }
    .slide { width:1280px; height:720px; background:var(--surface); border-radius:24px; padding:56px; position:relative; overflow:hidden; box-shadow:0 24px 60px rgba(0,0,0,.12); }
    .tag { display:inline-block; padding:8px 12px; border-radius:999px; background:var(--surface-2); color:var(--muted); font-size:14px; }
    .button { position:absolute; top:24px; right:24px; border:none; background:var(--accent); color:#fff; padding:10px 14px; border-radius:999px; cursor:pointer; }
    .cols { display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-top:32px; }
    .card { background:var(--surface-2); border-radius:20px; padding:20px; }
  </style>
</head>
<body data-theme="light">
  <button class="button" onclick="document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark')">Toggle theme</button>
  <div class="deck">
    <section class="slide active">
      <span class="tag">CSS variables</span>
      <h1 style="font-size:68px;line-height:1.02;margin:24px 0 16px;max-width:840px;">Тема через кастомные свойства CSS</h1>
      <p style="font-size:24px;line-height:1.45;max-width:760px;color:var(--muted);">Хороший кейс для проверки: editor не должен ломать тему, а изменения текста и вставка новых блоков должны корректно наследовать переменные.</p>
      <div class="cols">
        <div class="card"><strong>Light/Dark</strong><br/>Переключение тем внутри HTML.</div>
        <div class="card"><strong>Variables inheritance</strong><br/>Цвета и поверхности строятся через var(...).</div>
      </div>
    </section>
  </div>
</body>
</html>
